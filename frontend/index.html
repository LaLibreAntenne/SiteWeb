<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/js/all.min.js"></script>
    <link rel="stylesheet" href="styles/styles.css">
    <title>La Libre Antenne</title>
</head>
<body>
    <!-- Accueil -->
    <section class="top-page" id="Accueil">
        <header>
            <img src="./assets/logo.png" alt="Logo du Réseau" class="logo">
            <nav class="top-navigation">
                <li><a href="#Accueil">Accueil</a></li>
            </nav>
        </header>
        <div class="landing-page">
            <a class="scroll-btn" href="">Scroll <i class="fas fa-angle-down"></i></a>
        </div>
    </section>

    <!-- Information sur le serveur -->
    <section class="server-info">
        <!-- Membre du serveur -->
        <div class="server-info-items">
            <i class="fas fa-users"></i>
            <p class="server-info-details-fetch"><span id="member-counts">Chargement...</span></p>
            <p class="server-info-details">Membres</p>
        </div>
        <!-- Nombre de Staff -->
        <div class="server-info-items">
            <i class="fas fa-solid fa-gavel"></i>
            <p class="server-info-details-fetch"><span id="staff-counts">Chargement...</span></p>
            <p class="server-info-details">Staffs</p>
        </div>
        <!--  Date d'Ouverture -->
        <div class="server-info-items">
            <i class="fas fa-calendar-days"></i>
            <p class="server-info-details-fetch"><span id="open-date">Chargement...</span></p>
            <p class="server-info-details">Date d'Ouverture</p>
        </div>
    </section>
    <script src="./scripts.js"></script>
</body>
</html>
